  services:
    app:
      build: .
      container_name: wacdo_b2_app
      env_file: .env
      volumes:
        - uploads_data:/var/www/html/storage/uploads
      depends_on:
        db:
          condition: service_healthy
      restart: unless-stopped
      networks:
        - admin_proxy
        - internal
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=admin_proxy"
        - "traefik.http.routers.wacdo-b2.rule=Host(`wacdo-b2.a3n.fr`)"
        - "traefik.http.routers.wacdo-b2.entrypoints=websecure"
        - "traefik.http.routers.wacdo-b2.tls.certresolver=letsencrypt"
        - "traefik.http.services.wacdo-b2.loadbalancer.server.port=80"

    db:
      image: postgres:16-alpine
      container_name: wacdo_b2_db
      environment:
        POSTGRES_DB: ${DB_NAME}
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
        - db_data:/var/lib/postgresql/data
        - ./database:/docker-entrypoint-initdb.d:ro
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
        interval: 5s
        timeout: 5s
        retries: 10
      restart: unless-stopped
      networks:
        - internal

  volumes:
    db_data:
    uploads_data:

  networks:
    admin_proxy:
      external: true
    internal:
      name: wacdo_b2_internal
      ipam:                      
        config:
          - subnet: 172.50.0.0/24
