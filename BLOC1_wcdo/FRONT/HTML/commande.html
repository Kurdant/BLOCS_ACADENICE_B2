<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Catalogue Wacdo et panier de commande">
  <title>Wacdo - Commande</title>
  <link rel="stylesheet" href="../CSS/pages/commande.css">
  <link rel="stylesheet" href="../CSS/components/categories.css">
  <link rel="stylesheet" href="../CSS/components/products.css">
  <link rel="stylesheet" href="../CSS/components/cart.css">
  <link rel="stylesheet" href="../CSS/components/modal.css">
  <script type="module" src="../JS/commande.js"></script>
</head>
<body>
  <main class="order-layout">
    <section class="catalog-area" aria-labelledby="catalog-title">

      <nav class="categories-nav" aria-label="Catégories">
        <button class="carousel-arrow carousel-prev" type="button" aria-label="Catégorie précédente">&#9664;</button>
        <div class="categories-track-wrapper">
          <div class="categories-list" id="categories-list"></div>
        </div>
        <button class="carousel-arrow carousel-next" type="button" aria-label="Catégorie suivante">&#9654;</button>
      </nav>

      <div class="catalog-heading">
        <div>
          <h2 id="catalog-title">Nos menus</h2>
          <p id="catalog-subtitle">Un sandwich, une friture ou une salade et une boisson</p>
          <p id="catalog-status" role="status" hidden>Chargement du catalogue...</p>
        </div>
        <button class="secondary-button" id="retry-catalog" type="button" hidden>Réessayer</button>
      </div>

      <div class="products-grid" id="products-grid" aria-live="polite"></div>
    </section>

    <aside class="cart-panel" aria-label="Panier">
      <div class="cart-header">
        <div class="cart-header-top">
          <img class="cart-logo" src="../Json_donnees/wacdo/images/logo.png" alt="Wacdo">
          <div class="cart-order-info">
            <p class="cart-order-label">Commande numéro</p>
            <p class="cart-order-number">72</p>
          </div>
        </div>
        <p class="cart-order-type" id="order-mode">Sur place</p>
      </div>
      <div class="cart-lines" id="cart-lines"></div>
      <p class="cart-error" id="cart-error" role="alert"></p>
      <div class="cart-footer">
        <div class="cart-total-row">
          <span>TOTAL (ttc)</span>
          <strong id="cart-total">0,00 €</strong>
        </div>
        <div class="cart-actions">
          <button class="btn-abandon" id="abandon-cart" type="button">Abandon</button>
          <button class="btn-payer" id="validate-cart" type="button" disabled>Payer</button>
        </div>
      </div>
    </aside>
  </main>

  <div class="modal-root" id="selection-modal" hidden></div>
</body>
</html>
